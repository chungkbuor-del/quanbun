<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng & Doanh Thu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: sans-serif; }
        .stats-card { border: none; border-radius: 15px; transition: 0.3s; }
        .order-card { border-left: 5px solid #dc3545; margin-bottom: 15px; border-radius: 10px; }
        .order-done { border-left: 5px solid #198754; opacity: 0.8; background: #e9ecef; }
        .badge-cash { background: #ffc107; color: #000; }
        .badge-transfer { background: #0d6efd; color: #fff; }
        .sticky-top-stats { position: sticky; top: 10px; z-index: 100; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h2 class="text-center fw-bold mb-4">📊 QUẢN LÝ QUÁN</h2>

        <div class="row g-3 mb-4 sticky-top-stats">
            <div class="col-6 col-md-4">
                <div class="card stats-card bg-white shadow-sm p-3 text-center">
                    <small class="text-muted">💵 TIỀN MẶT</small>
                    <h4 id="revenue-cash" class="fw-bold text-warning mb-0">0đ</h4>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card stats-card bg-white shadow-sm p-3 text-center">
                    <small class="text-muted">💳 CHUYỂN KHOẢN</small>
                    <h4 id="revenue-transfer" class="fw-bold text-primary mb-0">0đ</h4>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card stats-card bg-danger text-white shadow-sm p-3 text-center">
                    <small>🚀 TỔNG DOANH THU</small>
                    <h4 id="revenue-total" class="fw-bold mb-0">0đ</h4>
                </div>
            </div>
        </div>

        <hr>

        <div class="row">
            <div class="col-md-7">
                <h5 class="fw-bold mb-3">🔔 Đơn mới nhận</h5>
                <div id="list-orders-new"></div>
            </div>
            <div class="col-md-5">
                <h5 class="fw-bold mb-3 text-muted">✅ Đơn đã xong</h5>
                <div id="list-orders-done"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOasks_plua7yYBVgXIN3dKNIBS3WhO3Y",
            authDomain: "quanbun-6cf3b.firebaseapp.com",
            projectId: "quanbun-6cf3b",
            storageBucket: "quanbun-6cf3b.firebasestorage.app",
            messagingSenderId: "553498423375",
            appId: "1:553498423375:web:8c1ecdc1b3bd14651e7a3a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LẮNG NGHE DỮ LIỆU ĐƠN HÀNG
        const q = query(collection(db, "orders"), orderBy("thoiGian", "desc"));
        onSnapshot(q, (snap) => {
            const newDiv = document.getElementById('list-orders-new');
            const doneDiv = document.getElementById('list-orders-done');
            newDiv.innerHTML = "";
            doneDiv.innerHTML = "";

            let tienMat = 0;
            let chuyenKhoan = 0;

            snap.forEach(d => {
                const order = d.data();
                const id = d.id;
                const itemsHtml = order.danhSachMon.map(i => `<li>${i.name} x${i.qty}</li>`).join("");

                if (order.trangThai === "cho_lam") {
                    newDiv.innerHTML += `
                        <div class="card order-card shadow-sm p-3 bg-white">
                            <div class="d-flex justify-content-between">
                                <h6 class="fw-bold text-danger">Khách: ${order.khach}</h6>
                                <small class="text-muted">${order.thoiGian.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>
                            </div>
                            <ul class="small mb-2">${itemsHtml}</ul>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold">${order.tongTien.toLocaleString()}đ</span>
                                <div class="btn-group">
                                    <button class="btn btn-outline-warning btn-sm" onclick="xacNhanDon('${id}', 'Tiền mặt')">💵 Tiền mặt</button>
                                    <button class="btn btn-outline-primary btn-sm" onclick="xacNhanDon('${id}', 'Chuyển khoản')">💳 CK</button>
                                </div>
                            </div>
                        </div>`;
                } else {
                    // Đơn đã xong -> Cộng vào doanh thu
                    if (order.phuongThucTT === "Tiền mặt") tienMat += order.tongTien;
                    if (order.phuongThucTT === "Chuyển khoản") chuyenKhoan += order.tongTien;

                    doneDiv.innerHTML += `
                        <div class="card order-card order-done p-2 mb-2 small shadow-none">
                            <div class="d-flex justify-content-between">
                                <span><b>${order.khach}</b> - ${order.tongTien.toLocaleString()}đ</span>
                                <span class="badge ${order.phuongThucTT === 'Tiền mặt' ? 'badge-cash' : 'badge-transfer'}">${order.phuongThucTT}</span>
                            </div>
                        </div>`;
                }
            });

            // Cập nhật con số Doanh thu
            document.getElementById('revenue-cash').innerText = tienMat.toLocaleString() + "đ";
            document.getElementById('revenue-transfer').innerText = chuyenKhoan.toLocaleString() + "đ";
            document.getElementById('revenue-total').innerText = (tienMat + chuyenKhoan).toLocaleString() + "đ";
        });

        // HÀM XỬ LÝ KHI ẤN THANH TOÁN
        window.xacNhanDon = async (id, loai) => {
            if(!confirm(`Xác nhận khách trả bằng ${loai}?`)) return;
            try {
                await updateDoc(doc(db, "orders", id), {
                    trangThai: "da_xong",
                    phuongThucTT: loai
                });
            } catch (e) { alert("Lỗi cập nhật!"); }
        };
    </script>
</body>
</html>
