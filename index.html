<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Món - Quán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f8f9fa; padding-bottom: 180px; font-family: sans-serif; }
        .menu-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0; z-index: 1000; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #dc3545; background: white; color: #dc3545; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .note-input { font-size: 0.85rem; border: none; border-bottom: 1px dashed #ccc; border-radius: 0; padding: 2px 0; background: transparent; }
        .category-tag { font-size: 0.7rem; background: #eee; color: #666; padding: 2px 8px; border-radius: 10px; margin-bottom: 5px; display: inline-block; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container py-3">
        <h3 class="text-center fw-bold text-danger mb-4">🍜 ĐẶT MÓN QUÁN</h3>
        
        <div class="card p-3 mb-4 border-0 shadow-sm">
            <label class="fw-bold mb-1 small text-muted text-uppercase">Tên của bạn:</label>
            <input type="text" id="ten-khach" class="form-control form-control-lg border-danger shadow-none" placeholder="Nhập tên tại đây...">
        </div>

        <div id="display-menu">
            <div class="text-center p-5 text-muted">Đang tải danh sách món...</div>
        </div>

        <div class="cart-bar">
            <div id="cart-details" class="mb-3" style="max-height: 150px; overflow-y: auto;"></div>
            <div class="d-flex justify-content-between align-items-center border-top pt-2">
                <div><small class="text-muted">Tổng tiền:</small><h4 id="total-price" class="text-danger fw-bold mb-0">0đ</h4></div>
                <button class="btn btn-danger btn-lg fw-bold px-4" onclick="guiDonHang()">GỬI ĐƠN</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOasks_plua7yYBVgXIN3dKNIBS3WhO3Y",
            authDomain: "quanbun-6cf3b.firebaseapp.com",
            projectId: "quanbun-6cf3b",
            storageBucket: "quanbun-6cf3b.firebasestorage.app",
            messagingSenderId: "553498423375",
            appId: "1:553498423375:web:8c1ecdc1b3bd14651e7a3a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cart = {};

        // ĐỒNG BỘ: SẮP XẾP MỚI NHẤT LÊN ĐẦU (OrderBy createdAt)
        onSnapshot(query(collection(db, "MENU"), orderBy("createdAt", "desc")), (snap) => {
            const menuDiv = document.getElementById('display-menu');
            menuDiv.innerHTML = "";
            
            snap.forEach(d => {
                const item = d.data();
                menuDiv.innerHTML += `
                    <div class="menu-item d-flex justify-content-between align-items-center">
                        <div style="flex: 1; padding-right: 10px;">
                            <span class="category-tag">${item.category || 'KHÁC'}</span>
                            <div class="fw-bold fs-6">${item.name}</div>
                            <div class="text-danger fw-bold small">${item.price.toLocaleString()}đ</div>
                        </div>
                        <button class="btn btn-danger btn-sm rounded-pill px-3 shadow-sm" 
                                onclick="updateCart('${item.name.replace(/\n/g, " ")}', ${item.price}, 1)">
                            + Thêm
                        </button>
                    </div>`;
            });
        });

        window.updateCart = (name, price, change) => {
            if (!cart[name]) cart[name] = { name, price, qty: 0, note: "" };
            cart[name].qty += change;
            if (cart[name].qty <= 0) delete cart[name];
            renderUI();
        };

        window.updateNote = (name, val) => { if (cart[name]) cart[name].note = val; };

        function renderUI() {
            const list = document.getElementById('cart-details');
            list.innerHTML = "";
            let total = 0;
            Object.values(cart).forEach(item => {
                total += item.price * item.qty;
                list.innerHTML += `
                    <div class="bg-light p-2 rounded border mb-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold small">${item.name}</span>
                            <div class="d-flex align-items-center">
                                <button class="qty-btn" onclick="updateCart('${item.name}', ${item.price}, -1)">-</button>
                                <b class="mx-3 fs-6">${item.qty}</b>
                                <button class="qty-btn" onclick="updateCart('${item.name}', ${item.price}, 1)">+</button>
                            </div>
                        </div>
                        <input type="text" class="form-control note-input mt-1" placeholder="Ghi chú món này..." value="${item.note}" onchange="updateNote('${item.name}', this.value)">
                    </div>`;
            });
            document.getElementById('total-price').innerText = total.toLocaleString() + "đ";
        }

        window.guiDonHang = async () => {
            const ten = document.getElementById('ten-khach').value.trim();
            const items = Object.values(cart);
            if (!ten) return Swal.fire('Lỗi', 'Vui lòng nhập tên!', 'warning');
            if (items.length === 0) return Swal.fire('Lỗi', 'Chưa chọn món!', 'info');

            try {
                await addDoc(collection(db, "orders"), {
                    khach: ten,
                    danhSachMon: items,
                    tongTien: items.reduce((s, i) => s + (i.price * i.qty), 0),
                    trangThai: "dang_cho",
                    thoiGian: serverTimestamp()
                });
                Swal.fire('Thành công', 'Đã gửi đơn!', 'success');
                cart = {}; renderUI(); document.getElementById('ten-khach').value = "";
            } catch(e) { Swal.fire('Lỗi', 'Gửi đơn thất bại!', 'error'); }
        };
    </script>
</body>
</html>
